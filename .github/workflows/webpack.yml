name: Deploy Angular to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - run: cp dist/angular-test/browser/index.html dist/angular-test/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/angular-test/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
